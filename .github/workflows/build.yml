name: Build Nebula Mesh

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build broker (release)
        run: cargo build --release -p broker

      - name: Build client (release)
        run: cargo build --release -p client

      - name: Prepare artifact directory (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/broker dist/nebula-broker-macos
          cp target/release/client dist/nebula-client-macos

      - name: Prepare artifact directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/broker.exe dist/nebula-broker-windows.exe
          Copy-Item target/release/client.exe dist/nebula-client-windows.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nebula-${{ runner.os }}-release
          path: dist/*
          if-no-files-found: error
